name: hafalan_kitab
description: "Aplikasi manajemen setoran hafalan kitab santri"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_native_splash: ^2.4.6
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.4
  image_picker: ^1.2.2
  intl: ^0.20.2
  fl_chart: ^1.2.0
  pdf: ^3.12.0
  printing: ^5.14.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4 # ✅ Dipindahkan ke dev_dependencies tanpa mengubah versi

flutter_native_splash:
  image: "assets/logobaru.png"
  android: true
  fullscreen: true

flutter:
  uses-material-design: true
  assets: 
    - assets/logobaru.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logobaru.png"
  min_sdk_android: 21
  
  # Tambahkan dua baris ini untuk Android modern:
  adaptive_icon_background: "#FFFFFF" # Warna latar belakang ikon (misal: Putih)
  adaptive_icon_foreground: "assets/logobaru.png" # Gambar utama logo Anda
  
  web:
    generate: true
    image_path: "assets/logobaru.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/logobaru.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/logobaru.png"