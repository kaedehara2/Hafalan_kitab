name: hafalan_kitab
description: "Aplikasi manajemen setoran hafalan kitab santri"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_native_splash: ^2.4.6
  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.14.4
  supabase_flutter: ^2.12.4
  image_picker: ^1.2.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0  # ✅ Pindahkan ke sini

flutter_native_splash:
  color: "#FFFCFB"
  image: "assets/logo.png"
  android: true
  fullscreen: true

flutter:
  uses-material-design: true
  assets: 
    - assets/logo.png
