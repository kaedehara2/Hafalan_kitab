name: hafalan_kitab
description: "Aplikasi manajemen setoran hafalan kitab santri"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_native_splash: ^2.4.6
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.4
  image_picker: ^1.2.2
  intl: ^0.20.2
  fl_chart: ^1.2.0
  pdf: ^3.12.0
  printing: ^5.14.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

# ◄ REVISI KONFIGURASI SPLASH SCREEN ►
flutter_native_splash:
  color: "#FFFFFF"          # Latar belakang putih bersih
  image: "assets/logobaru.png" # File baru hasil ekspor Figma kamu
  android: true
  ios: true
  fullscreen: true

  # Setelan khusus Android 12 ke atas
  android_12:
    color: "#FFFFFF"
    image: "assets/logobaru.png"

flutter:
  uses-material-design: true
  assets: 
    - assets/logobaru.png
    - assets/logobaru1.png

# ◄ REVISI KONFIGURASI IKON APLIKASI (OPSIONAL TAPI DISARANKAN) ►
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logobaru.png"
  min_sdk_android: 21
  
  # Untuk ikon aplikasilanskap, berikan margin latar belakang agar ikon lanskap
  # terlihat utuh di dalam bentuk adaptif (lingkaran/kotak) ponsel.
  # Gunakan gambar ikon yang sudah diperkecil (dengan padding) sebagai foreground.
  adaptive_icon_background: "#FFFFFF" # Warna latar belakang ikon
  adaptive_icon_foreground: "assets/logobaru.png" # Gambar utama ikon Anda

  web:
    generate: true
    image_path: "assets/logobaru.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"
  windows:
    generate: true
    image_path: "assets/logobaru.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/logobaru.png"